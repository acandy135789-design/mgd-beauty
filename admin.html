<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台管理 · Magic Garden 美肌花園</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500&family=Cinzel:wght@400;500&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold:#C5A059; --forest:#0d1a0e; --deep:#060d06; --mist:#9EA89C; --pearl:#F0ECE4; }
    body { background: #0a0f0a; color: var(--pearl); font-family: 'Noto Serif TC', sans-serif; min-height: 100vh; }

    .nav { background: rgba(6,13,6,0.98); border-bottom: 1px solid rgba(197,160,89,0.2); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-title { font-family: 'Cinzel', serif; font-size: 15px; letter-spacing: 0.3em; color: var(--gold); }
    .nav-user { font-size: 14px; color: var(--mist); }
    .logout-link { color: var(--mist); font-size: 14px; cursor: pointer; margin-left: 20px; }
    .logout-link:hover { color: var(--gold); }

    /* ADMIN LOGIN */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card { width: 100%; max-width: 400px; background: rgba(13,26,14,0.9); border: 1px solid rgba(197,160,89,0.2); padding: 48px 40px; }
    .login-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; text-align: center; margin-bottom: 8px; }
    .login-sub { font-size: 14px; color: var(--mist); text-align: center; margin-bottom: 32px; }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 64px); }
    .sidebar { background: rgba(13,26,14,0.6); border-right: 1px solid rgba(197,160,89,0.12); padding: 28px 0; }
    .sidebar-item { padding: 14px 28px; font-size: 15px; color: var(--mist); cursor: pointer; transition: all 0.2s; border-left: 2px solid transparent; display: flex; align-items: center; gap: 10px; }
    .sidebar-item:hover, .sidebar-item.active { color: var(--gold); border-left-color: var(--gold); background: rgba(197,160,89,0.05); }
    .content { padding: 32px; }
    .page { display: none; }
    .page.active { display: block; }

    /* FORM */
    .card { background: rgba(13,26,14,0.8); border: 1px solid rgba(197,160,89,0.15); padding: 28px 32px; margin-bottom: 24px; }
    .card-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.35em; color: var(--gold); margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-group { }
    .form-label { display: block; font-size: 13px; color: var(--mist); margin-bottom: 6px; letter-spacing: 0.05em; }
    .form-input, .form-select { width: 100%; background: rgba(6,13,6,0.8); border: 1px solid rgba(197,160,89,0.2); color: var(--pearl); padding: 10px 14px; font-size: 15px; font-family: 'Noto Serif TC', serif; outline: none; transition: border-color 0.3s; }
    .form-input:focus, .form-select:focus { border-color: var(--gold); }
    .form-select option { background: #0d1a0e; }
    .pts-preview { padding: 12px 16px; background: rgba(197,160,89,0.08); border: 1px solid rgba(197,160,89,0.2); font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold); text-align: center; margin-bottom: 16px; }
    .btn { padding: 12px 32px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'Noto Serif TC', serif; font-size: 15px; cursor: pointer; transition: all 0.3s; letter-spacing: 0.08em; }
    .btn:hover { background: rgba(197,160,89,0.12); }
    .btn-sm { padding: 8px 18px; font-size: 13px; }
    .btn-danger { border-color: rgba(200,80,80,0.5); color: rgba(200,80,80,0.8); }
    .msg { margin-top: 12px; padding: 10px 14px; font-size: 14px; }
    .msg.error { background: rgba(180,60,60,0.12); border: 1px solid rgba(180,60,60,0.3); color: #f5a5a5; }
    .msg.success { background: rgba(60,140,60,0.12); border: 1px solid rgba(60,140,60,0.3); color: #a5f5a5; }

    /* MEMBER TABLE */
    .search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
    .search-bar .form-input { flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 12px 16px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.3em; color: var(--mist); border-bottom: 1px solid rgba(197,160,89,0.15); font-weight: 400; }
    td { padding: 14px 16px; border-bottom: 1px solid rgba(197,160,89,0.07); color: var(--pearl); font-size: 14px; }
    tr:hover td { background: rgba(197,160,89,0.03); }
    .tier-pill { display: inline-block; padding: 3px 10px; font-size: 11px; letter-spacing: 0.1em; border: 1px solid rgba(197,160,89,0.3); color: var(--gold); }
    .tier-pill.vip { border-color: rgba(232,213,163,0.5); color: #E8D5A3; }
    .tier-pill.gold { border-color: rgba(197,160,89,0.5); color: var(--gold); }
    .tier-pill.silver { border-color: rgba(192,192,192,0.4); color: #C0C0C0; }
    .stat-card { background: rgba(13,26,14,0.7); border: 1px solid rgba(197,160,89,0.12); padding: 24px 28px; }
    .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 40px; color: var(--gold); font-weight: 300; }
    .stat-label { font-size: 13px; color: var(--mist); margin-top: 4px; letter-spacing: 0.06em; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .hidden { display: none !important; }
    .member-result { background: rgba(13,26,14,0.8); border: 1px solid rgba(197,160,89,0.2); padding: 16px 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .member-result-info { }
    .member-result-name { font-size: 17px; color: var(--pearl); margin-bottom: 4px; }
    .member-result-sub { font-size: 13px; color: var(--mist); }
    .member-result-pts { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--gold); }

    @media(max-width:768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: flex; overflow-x: auto; padding: 0; border-right: none; border-bottom: 1px solid rgba(197,160,89,0.12); }
      .sidebar-item { white-space: nowrap; border-left: none; border-bottom: 2px solid transparent; padding: 16px 20px; }
      .sidebar-item.active { border-bottom-color: var(--gold); border-left-color: transparent; }
      .form-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Admin Login -->
<div id="admin-login" class="login-wrap">
  <div class="login-card">
    <div class="login-title">後台管理</div>
    <div class="login-sub" style="margin-bottom:32px;">Magic Garden 管理員登入</div>
    <div class="form-group" style="margin-bottom:16px;">
      <label class="form-label">管理員 Email</label>
      <input class="form-input" type="email" id="admin-email" placeholder="admin@email.com" />
    </div>
    <div class="form-group" style="margin-bottom:20px;">
      <label class="form-label">密碼</label>
      <input class="form-input" type="password" id="admin-password" placeholder="••••••••" />
    </div>
    <button class="btn" style="width:100%;padding:13px;" onclick="adminLogin()">登入後台</button>
    <div id="admin-login-msg"></div>
  </div>
</div>

<!-- Admin Panel -->
<div id="admin-panel" class="hidden">
  <nav class="nav">
    <div class="nav-title">MAGIC GARDEN · 後台管理</div>
    <div style="display:flex;align-items:center;">
      <span class="nav-user" id="admin-email-display"></span>
      <span class="logout-link" onclick="adminLogout()">登出</span>
    </div>
  </nav>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-item active" onclick="showPage('page-service')" id="nav-service">➕ 新增服務紀錄</div>
      <div class="sidebar-item" onclick="showPage('page-members')" id="nav-members">👥 會員管理</div>
      <div class="sidebar-item" onclick="showPage('page-adjust')" id="nav-adjust">✏️ 手動調整點數</div>
    </div>

    <div class="content">

      <!-- 新增服務紀錄 -->
      <div class="page active" id="page-service">
        <div class="card">
          <div class="card-title">新增服務紀錄（自動計點）</div>

          <div class="form-row single">
            <div class="form-group">
              <label class="form-label">搜尋會員（輸入姓名或 Email）</label>
              <div style="display:flex;gap:10px;">
                <input class="form-input" type="text" id="search-member-input" placeholder="姓名 / Email" />
                <button class="btn btn-sm" onclick="searchMember()">搜尋</button>
              </div>
            </div>
          </div>

          <div id="search-results" style="margin-bottom:16px;"></div>
          <input type="hidden" id="selected-user-id" />
          <div id="selected-member-info" class="hidden" style="padding:12px 16px;background:rgba(197,160,89,0.08);border:1px solid rgba(197,160,89,0.2);margin-bottom:16px;font-size:14px;color:var(--gold);"></div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">服務項目</label>
              <select class="form-select" id="service-name" onchange="calcPoints()">
                <option value="外泌體頭皮深度修護">外泌體頭皮深度修護</option>
                <option value="基礎韓系護膚">基礎韓系護膚</option>
                <option value="痘痘粉刺淨化療程">痘痘粉刺淨化療程</option>
                <option value="微針毛孔精緻療程">微針毛孔精緻療程</option>
                <option value="韓系水光美白療程">韓系水光美白療程</option>
                <option value="身心靈整體調理">身心靈整體調理</option>
                <option value="其他服務">其他服務</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">消費金額（NT$）</label>
              <input class="form-input" type="number" id="service-amount" placeholder="3500" min="0" oninput="calcPoints()" />
            </div>
          </div>

          <div class="form-row single">
            <div class="form-group">
              <label class="form-label">備註（可選）</label>
              <input class="form-input" type="text" id="service-notes" placeholder="例：套組第3堂" />
            </div>
          </div>

          <div class="pts-preview" id="pts-preview">輸入金額後自動計算點數（每 NT$100 = 1 點）</div>
          <button class="btn" onclick="addService()">確認新增 · 自動發放點數</button>
          <div id="service-msg"></div>
        </div>
      </div>

      <!-- 會員管理 -->
      <div class="page" id="page-members">
        <div class="stats-row" id="stats-row">
          <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">總會員人數</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-points">—</div><div class="stat-label">系統總點數</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-vip">—</div><div class="stat-label">VIP 黑卡會員</div></div>
        </div>
        <div class="card">
          <div class="card-title">會員列表</div>
          <div class="search-bar">
            <input class="form-input" type="text" id="member-filter" placeholder="搜尋姓名或 Email..." oninput="filterMembers()" />
          </div>
          <div style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>姓名</th><th>Email</th><th>電話</th><th>等級</th><th>可用點數</th><th>累積點數</th><th>加入日期</th>
                </tr>
              </thead>
              <tbody id="members-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 手動調整點數 -->
      <div class="page" id="page-adjust">
        <div class="card">
          <div class="card-title">手動調整點數</div>
          <div class="form-row single">
            <div class="form-group">
              <label class="form-label">搜尋會員</label>
              <div style="display:flex;gap:10px;">
                <input class="form-input" type="text" id="adjust-search-input" placeholder="姓名 / Email" />
                <button class="btn btn-sm" onclick="searchMemberForAdjust()">搜尋</button>
              </div>
            </div>
          </div>
          <div id="adjust-results" style="margin-bottom:16px;"></div>
          <input type="hidden" id="adjust-user-id" />
          <div id="adjust-member-info" class="hidden" style="padding:12px 16px;background:rgba(197,160,89,0.08);border:1px solid rgba(197,160,89,0.2);margin-bottom:16px;font-size:14px;color:var(--gold);"></div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">調整點數（正數為加點，負數為扣點）</label>
              <input class="form-input" type="number" id="adjust-points" placeholder="例：100 或 -50" />
            </div>
            <div class="form-group">
              <label class="form-label">調整原因</label>
              <input class="form-input" type="text" id="adjust-reason" placeholder="例：活動贈點、錯誤更正" />
            </div>
          </div>
          <button class="btn" onclick="adjustPoints()">確認調整點數</button>
          <div id="adjust-msg"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://fplhhulzvcahvdujmwfj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_5MUc48gygOAJCzxr_WEGqg_meuCQY6E';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allMembers = [];

  const TIERS = [
    { name: '一般會員', min: 0, max: 999 },
    { name: '銀卡會員', min: 1000, max: 4999 },
    { name: '金卡會員', min: 5000, max: 14999 },
    { name: 'VIP 黑卡', min: 15000, max: Infinity },
  ];
  function getTier(total) { return (TIERS.find(t => total >= t.min && total <= t.max) || TIERS[0]).name; }
  function getTierClass(t) { return t === 'VIP 黑卡' ? 'vip' : t === '金卡會員' ? 'gold' : t === '銀卡會員' ? 'silver' : ''; }

  function showMsg(id, text, type) { const el = document.getElementById(id); el.className = 'msg ' + type; el.textContent = text; }

  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    const navId = 'nav-' + pageId.replace('page-', '');
    if (document.getElementById(navId)) document.getElementById(navId).classList.add('active');
    if (pageId === 'page-members') loadMembers();
  }

  async function adminLogin() {
    const email = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;
    if (!email || !password) return showMsg('admin-login-msg', '請填寫帳號與密碼', 'error');
    showMsg('admin-login-msg', '驗證中...', '');
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) return showMsg('admin-login-msg', '登入失敗：帳號或密碼錯誤', 'error');

    // Check admin
    const { data: adminCheck } = await sb.from('admin_users').select('user_id').eq('user_id', data.user.id).single();
    if (!adminCheck) {
      await sb.auth.signOut();
      return showMsg('admin-login-msg', '此帳號沒有管理員權限', 'error');
    }

    document.getElementById('admin-login').classList.add('hidden');
    document.getElementById('admin-panel').classList.remove('hidden');
    document.getElementById('admin-email-display').textContent = email;
  }

  async function adminLogout() {
    await sb.auth.signOut();
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('admin-login').classList.remove('hidden');
  }

  function calcPoints() {
    const amount = parseInt(document.getElementById('service-amount').value) || 0;
    const pts = Math.floor(amount / 100);
    document.getElementById('pts-preview').textContent = amount > 0 ? `NT$ ${amount.toLocaleString()} → 獲得 ${pts} 點` : '輸入金額後自動計算點數（每 NT$100 = 1 點）';
  }

  async function searchMember() {
    const q = document.getElementById('search-member-input').value.trim();
    if (!q) return;
    const { data } = await sb.from('profiles').select('*').or(`name.ilike.%${q}%,email.ilike.%${q}%`);
    const container = document.getElementById('search-results');
    if (!data || data.length === 0) { container.innerHTML = '<div style="color:var(--mist);font-size:14px;padding:8px 0;">找不到符合的會員</div>'; return; }
    container.innerHTML = data.map(m => `
      <div class="member-result">
        <div class="member-result-info">
          <div class="member-result-name">${m.name || '未設定姓名'}</div>
          <div class="member-result-sub">${m.email} · ${m.phone || '無電話'} · 可用點數 ${(m.points||0).toLocaleString()} 點</div>
        </div>
        <button class="btn btn-sm" onclick="selectMember('${m.id}','${m.name||m.email}','${(m.points||0)}')">選擇</button>
      </div>
    `).join('');
  }

  function selectMember(id, name, points) {
    document.getElementById('selected-user-id').value = id;
    document.getElementById('selected-member-info').textContent = `已選擇：${name}（目前 ${parseInt(points).toLocaleString()} 點）`;
    document.getElementById('selected-member-info').classList.remove('hidden');
    document.getElementById('search-results').innerHTML = '';
  }

  async function addService() {
    const userId = document.getElementById('selected-user-id').value;
    const serviceName = document.getElementById('service-name').value;
    const amount = parseInt(document.getElementById('service-amount').value) || 0;
    const notes = document.getElementById('service-notes').value.trim();
    if (!userId) return showMsg('service-msg', '請先搜尋並選擇會員', 'error');
    if (amount <= 0) return showMsg('service-msg', '請輸入消費金額', 'error');
    const pts = Math.floor(amount / 100);
    showMsg('service-msg', '處理中...', '');

    // Get current profile
    const { data: profile } = await sb.from('profiles').select('points,total_earned').eq('id', userId).single();
    if (!profile) return showMsg('service-msg', '找不到會員資料', 'error');

    const newPoints = (profile.points || 0) + pts;
    const newTotal = (profile.total_earned || 0) + pts;
    const newTier = getTier(newTotal);

    // Insert service record
    const { error: sErr } = await sb.from('services').insert({ user_id: userId, service_name: serviceName, amount, points_earned: pts, notes });
    if (sErr) return showMsg('service-msg', '新增服務失敗：' + sErr.message, 'error');

    // Insert points history
    await sb.from('points_history').insert({ user_id: userId, points: pts, type: 'earn', description: serviceName + (notes ? `（${notes}）` : '') });

    // Update profile
    const { error: uErr } = await sb.from('profiles').update({ points: newPoints, total_earned: newTotal, tier: newTier }).eq('id', userId);
    if (uErr) return showMsg('service-msg', '更新點數失敗：' + uErr.message, 'error');

    showMsg('service-msg', `✓ 成功！已發放 ${pts} 點，累積點數 ${newTotal.toLocaleString()}，等級：${newTier}`, 'success');
    document.getElementById('service-amount').value = '';
    document.getElementById('service-notes').value = '';
    document.getElementById('selected-user-id').value = '';
    document.getElementById('selected-member-info').classList.add('hidden');
    document.getElementById('pts-preview').textContent = '輸入金額後自動計算點數（每 NT$100 = 1 點）';
  }

  async function loadMembers() {
    const { data } = await sb.from('profiles').select('*').order('total_earned', { ascending: false });
    allMembers = data || [];
    renderMembers(allMembers);
    if (data) {
      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-points').textContent = data.reduce((s, m) => s + (m.points || 0), 0).toLocaleString();
      document.getElementById('stat-vip').textContent = data.filter(m => (m.total_earned || 0) >= 15000).length;
    }
  }

  function renderMembers(list) {
    const tbody = document.getElementById('members-tbody');
    if (!list || list.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--mist);padding:32px;">尚無會員</td></tr>'; return; }
    tbody.innerHTML = list.map(m => {
      const tier = getTier(m.total_earned || 0);
      const tc = getTierClass(tier);
      return `<tr>
        <td>${m.name || '—'}</td>
        <td style="color:var(--mist)">${m.email}</td>
        <td style="color:var(--mist)">${m.phone || '—'}</td>
        <td><span class="tier-pill ${tc}">${tier}</span></td>
        <td style="color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:18px;">${(m.points||0).toLocaleString()}</td>
        <td style="color:var(--mist)">${(m.total_earned||0).toLocaleString()}</td>
        <td style="color:var(--mist)">${new Date(m.created_at).toLocaleDateString('zh-TW')}</td>
      </tr>`;
    }).join('');
  }

  function filterMembers() {
    const q = document.getElementById('member-filter').value.toLowerCase();
    renderMembers(allMembers.filter(m => (m.name||'').toLowerCase().includes(q) || (m.email||'').toLowerCase().includes(q)));
  }

  async function searchMemberForAdjust() {
    const q = document.getElementById('adjust-search-input').value.trim();
    if (!q) return;
    const { data } = await sb.from('profiles').select('*').or(`name.ilike.%${q}%,email.ilike.%${q}%`);
    const container = document.getElementById('adjust-results');
    if (!data || data.length === 0) { container.innerHTML = '<div style="color:var(--mist);font-size:14px;padding:8px 0;">找不到符合的會員</div>'; return; }
    container.innerHTML = data.map(m => `
      <div class="member-result">
        <div class="member-result-info">
          <div class="member-result-name">${m.name || '未設定姓名'}</div>
          <div class="member-result-sub">${m.email} · 可用點數 ${(m.points||0).toLocaleString()} 點</div>
        </div>
        <button class="btn btn-sm" onclick="selectMemberForAdjust('${m.id}','${m.name||m.email}','${m.points||0}')">選擇</button>
      </div>
    `).join('');
  }

  function selectMemberForAdjust(id, name, points) {
    document.getElementById('adjust-user-id').value = id;
    document.getElementById('adjust-member-info').textContent = `已選擇：${name}（目前 ${parseInt(points).toLocaleString()} 點）`;
    document.getElementById('adjust-member-info').classList.remove('hidden');
    document.getElementById('adjust-results').innerHTML = '';
  }

  async function adjustPoints() {
    const userId = document.getElementById('adjust-user-id').value;
    const pts = parseInt(document.getElementById('adjust-points').value);
    const reason = document.getElementById('adjust-reason').value.trim();
    if (!userId) return showMsg('adjust-msg', '請先搜尋並選擇會員', 'error');
    if (isNaN(pts) || pts === 0) return showMsg('adjust-msg', '請輸入要調整的點數', 'error');
    if (!reason) return showMsg('adjust-msg', '請填寫調整原因', 'error');
    showMsg('adjust-msg', '處理中...', '');

    const { data: profile } = await sb.from('profiles').select('points,total_earned').eq('id', userId).single();
    if (!profile) return showMsg('adjust-msg', '找不到會員', 'error');

    const newPoints = Math.max(0, (profile.points || 0) + pts);
    const newTotal = Math.max(0, (profile.total_earned || 0) + (pts > 0 ? pts : 0));
    const newTier = getTier(newTotal);

    await sb.from('points_history').insert({ user_id: userId, points: pts, type: 'adjust', description: reason });
    const { error } = await sb.from('profiles').update({ points: newPoints, total_earned: newTotal, tier: newTier }).eq('id', userId);

    if (error) return showMsg('adjust-msg', '調整失敗：' + error.message, 'error');
    showMsg('adjust-msg', `✓ 成功！${pts > 0 ? '增加' : '扣除'} ${Math.abs(pts)} 點，目前可用點數：${newPoints.toLocaleString()}`, 'success');
    document.getElementById('adjust-points').value = '';
    document.getElementById('adjust-reason').value = '';
    document.getElementById('adjust-user-id').value = '';
    document.getElementById('adjust-member-info').classList.add('hidden');
  }

  // Check if already logged in
  sb.auth.getSession().then(async ({ data }) => {
    if (data.session) {
      const { data: adminCheck } = await sb.from('admin_users').select('user_id').eq('user_id', data.session.user.id).single();
      if (adminCheck) {
        document.getElementById('admin-login').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        document.getElementById('admin-email-display').textContent = data.session.user.email;
      }
    }
  });
</script>
</body>
</html>
