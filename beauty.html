<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開運科技美容 · Magic Garden 美肌花園</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Cinzel:wght@400;500;600;700;900&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    window.tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              midnight:'#060d06',forest:'#0d1a0e','deep-forest':'#0a1509',moss:'#2d4a30',leaf:'#3d6840',
              bronze:'#C5A059','bronze-lt':'#D4B06A','bronze-pale':'#E8D5A3',mist:'#9EA89C','mist-lt':'#C8D0C4',
              pearl:'#F0ECE4',cream:'#FAF7F2',
            },
            fontFamily: {
              serif:['"Cormorant Garamond"','Georgia','serif'],
              display:['Cinzel','serif'],
              body:['"Noto Serif TC"','sans-serif'],
            },
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="mgd-beauty.css">
</head>
<body>
  <canvas id="mist-canvas"></canvas>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function useScrollReveal() {
      useEffect(() => {
        const targets = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
        }, { threshold: 0.12 });
        targets.forEach(t => io.observe(t));
        return () => io.disconnect();
      }, []);
    }

    function Nav({ currentPage = '' }) {
      const [menuOpen, setMenuOpen] = React.useState(false);
      const links = [
        { label: '首頁',       href: 'index.html',    page: 'home' },
        { label: '開運科技健髮', href: 'hair.html',     page: 'hair' },
        { label: '開運科技美容', href: 'beauty.html',   page: 'beauty' },
        { label: '身心靈調理',  href: 'holistic.html', page: 'holistic' },
        { label: '創辦人故事',  href: 'founder.html',  page: 'founder' },
        { label: '關於我們',    href: 'team.html',     page: 'team' },
        { label: '夥伴資訊',    href: 'partners.html', page: 'partners' },
        { label: '夥伴招募',    href: 'recruit.html',  page: 'recruit' },
      ];
      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
          background: 'rgba(6,13,6,0.97)', backdropFilter: 'blur(14px)',
          borderBottom: '1px solid rgba(197,160,89,0.22)',
        }}>
          <div style={{ maxWidth: 1440, margin: '0 auto', padding: '0 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 76 }}>
            <a href="index.html" style={{ textDecoration: 'none', flexShrink: 0 }}>
              <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 21, fontWeight: 500, letterSpacing: '0.1em', color: '#C5A059', lineHeight: 1 }}>Magic Garden 美肌花園</div>
              <div style={{ fontFamily: 'Cinzel, serif', fontSize: 11, letterSpacing: '0.35em', color: '#9EA89C', marginTop: 4 }}>ENERGY · BEAUTY · VITALITY</div>
            </a>
            <div className="nav-links" style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
              {links.map(l => (
                <a key={l.label} href={l.href} className="nav-link" style={{
                  fontFamily: '"Noto Serif TC", serif', fontSize: 17, letterSpacing: '0.05em',
                  color: currentPage === l.page ? '#C5A059' : '#C8D0C4',
                  textDecoration: 'none', whiteSpace: 'nowrap',
                  borderBottom: currentPage === l.page ? '1px solid rgba(197,160,89,0.5)' : 'none',
                  paddingBottom: 2,
                }}
                  onMouseEnter={e => e.currentTarget.style.color = '#C5A059'}
                  onMouseLeave={e => e.currentTarget.style.color = currentPage === l.page ? '#C5A059' : '#C8D0C4'}
                >{l.label}</a>
              ))}
              <button className="btn-gold" style={{ padding: '11px 24px', fontSize: 15 }}><span>立即預約</span></button>
            </div>
            <button className="mobile-menu-btn" onClick={() => setMenuOpen(o => !o)} aria-label="選單">
              <span style={{ transform: menuOpen ? 'rotate(45deg) translate(0, 8px)' : 'none' }} />
              <span style={{ opacity: menuOpen ? 0 : 1, transform: menuOpen ? 'scaleX(0)' : 'none' }} />
              <span style={{ transform: menuOpen ? 'rotate(-45deg) translate(0, -8px)' : 'none' }} />
            </button>
          </div>
          {menuOpen && (
            <div className="mobile-nav-drawer">
              {links.map(l => (
                <a key={l.label} href={l.href} className={`mobile-nav-link${currentPage === l.page ? ' active' : ''}`}>{l.label}</a>
              ))}
              <button className="btn-gold" style={{ marginTop: 20, width: '100%' }}><span>立即預約</span></button>
            </div>
          )}
        </nav>
      );
    }

    function Footer() {
      const cols = [
        { title: '服務項目', links: [{ label: '開運科技健髮', href: 'hair.html' }, { label: '開運科技美容', href: 'beauty.html' }, { label: '身心靈整體調理', href: 'holistic.html' }, { label: '貴賓預約', href: '#' }] },
        { title: '品牌',     links: [{ label: '創辦人故事', href: 'founder.html' }, { label: '關於我們的團隊', href: 'team.html' }, { label: '夥伴資訊', href: 'partners.html' }, { label: '夥伴招募', href: 'recruit.html' }] },
        { title: '聯絡',     links: [{ label: 'LINE 預約', href: '#' }, { label: '電話諮詢', href: '#' }, { label: '電子郵件', href: '#' }, { label: '桃園全區服務', href: '#' }] },
      ];
      return (
        <footer style={{ background: '#040904', borderTop: '1px solid rgba(197,160,89,0.15)', padding: '80px 48px 40px' }}>
          <div style={{ maxWidth: 1380, margin: '0 auto' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 60, paddingBottom: 60, borderBottom: '1px solid rgba(197,160,89,0.1)' }}>
              <div>
                <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 26, fontWeight: 500, letterSpacing: '0.15em', color: '#C5A059', marginBottom: 4 }}>Magic Garden 美肌花園</div>
                <div style={{ fontFamily: 'Cinzel, serif', fontSize: 13, letterSpacing: '0.45em', color: '#9EA89C', marginBottom: 24 }}>ENERGY · BEAUTY · VITALITY</div>
                <p style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 18, color: '#9EA89C', lineHeight: 2.2, letterSpacing: '0.07em', maxWidth: 300 }}>能量美學品牌 · 開運美容護膚／秀髮養育<br />貴賓預約優先制</p>
                <div style={{ marginTop: 20 }}>
                  <div style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 18, color: '#C8D0C4', letterSpacing: '0.07em', marginBottom: 8 }}>📞 0927-186-901</div>
                  <div style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 18, color: '#C8D0C4', letterSpacing: '0.07em' }}>✉️ acandy135789@gmail.com</div>
                </div>
                <div style={{ display: 'flex', gap: 14, marginTop: 28 }}>
                  {['IG', 'FB', 'LINE'].map(s => (
                    <a key={s} href="#" style={{ fontFamily: 'Cinzel, serif', fontSize: 15, letterSpacing: '0.25em', color: '#9EA89C', textDecoration: 'none', border: '1px solid rgba(197,160,89,0.25)', padding: '8px 14px', transition: 'all 0.3s' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = '#C5A059'; e.currentTarget.style.color = '#C5A059'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(197,160,89,0.25)'; e.currentTarget.style.color = '#9EA89C'; }}
                    >{s}</a>
                  ))}
                </div>
              </div>
              {cols.map(col => (
                <div key={col.title}>
                  <div style={{ fontFamily: 'Cinzel, serif', fontSize: 15, letterSpacing: '0.35em', color: '#C5A059', marginBottom: 24 }}>{col.title}</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                    {col.links.map(l => (
                      <a key={l.label} href={l.href} style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 18, color: '#9EA89C', textDecoration: 'none', letterSpacing: '0.07em', transition: 'color 0.3s' }}
                        onMouseEnter={e => e.currentTarget.style.color = '#C5A059'}
                        onMouseLeave={e => e.currentTarget.style.color = '#9EA89C'}
                      >{l.label}</a>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 32, flexWrap: 'wrap', gap: 16 }}>
              <div style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 16, color: 'rgba(158,168,156,0.5)', letterSpacing: '0.1em' }}>© 2025 Magic Garden 美肌花園. All Rights Reserved.</div>
              <div style={{ display: 'flex', gap: 28 }}>
                {['隱私政策', '服務條款', 'Cookie 設定'].map(l => (
                  <a key={l} href="#" style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 16, color: 'rgba(158,168,156,0.5)', textDecoration: 'none', letterSpacing: '0.08em' }}>{l}</a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    }

    function BeautyCare() {
      const treatments = [
        {
          id: '01', title: '基礎韓系護膚', en: 'BASIC KOREAN SKINCARE',
          desc: '以富含維生素 B5 的韓國進口產品進行深層保溼護理，有效修復敏感肌膚，低刺激配方讓肌膚重現水潤光澤。',
          suitable: '適合：乾性、油性、混合性、敏感肌',
          img: 'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?auto=format&fit=crop&w=700&q=80',
        },
        {
          id: '02', title: '痘痘粉刺淨化療程', en: 'ACNE & BLACKHEAD TREATMENT',
          desc: '針對油性、痘痘肌設計，以溫和的物理清潔方式疏通毛孔、去除老廢角質，不傷害肌膚結構，讓毛孔自由呼吸。',
          suitable: '適合：油性肌、痘痘肌',
          img: 'https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?auto=format&fit=crop&w=700&q=80',
        },
        {
          id: '03', title: '微針毛孔精緻療程', en: 'MICRONEEDLE PORE REFINEMENT',
          desc: '利用微針技術促進保養品有效滲透，縮小毛孔、細緻肌膚紋理，不破壞肌膚屏障，效果顯著且持久。',
          suitable: '適合：油性、混合肌（敏感乾性建議先進行基礎護膚）',
          img: 'https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?auto=format&fit=crop&w=700&q=80',
        },
        {
          id: '04', title: '韓系水光美白療程', en: 'KOREAN WATER-LIGHT WHITENING',
          desc: '運用維生素 B3 有效成分改善膚色不均、暗沉與曬黑，讓肌膚恢復透亮光采。乾性敏感肌建議先完成基礎護理後進行。',
          suitable: '適合：所有膚質（乾敏肌建議先做基礎護膚）',
          img: 'https://images.unsplash.com/photo-1519415943484-9fa1873496d4?auto=format&fit=crop&w=700&q=80',
        },
        {
          id: '05', title: '手部手臂嫩白護理', en: 'HAND & ARM CARE',
          desc: '專為騎車族、戶外工作者設計，針對手部與手臂的曬黑、老化問題進行深度美白與嫩膚護理，恢復年輕細嫩肌膚。',
          suitable: '適合：所有膚質',
          img: 'https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&w=700&q=80',
        },
      ];

      return (
        <section className="sec-dark" style={{ padding: '140px 0', position: 'relative', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', fontFamily: '"Cormorant Garamond", serif', fontSize: 180, fontWeight: 700, color: 'rgba(197,160,89,0.025)', whiteSpace: 'nowrap', userSelect: 'none', pointerEvents: 'none' }}>
            BEAUTY
          </div>
          <div style={{ maxWidth: 1380, margin: '0 auto', padding: '0 48px', position: 'relative' }}>
            <div style={{ textAlign: 'center', marginBottom: 80 }}>
              <div className="reveal" style={{ fontFamily: 'Cinzel, serif', fontSize: 15, letterSpacing: '0.55em', color: '#C5A059' }}>TECHNOLOGY BEAUTY CARE</div>
              <span className="gold-line" />
              <h2 className="reveal delay-1" style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 'clamp(2rem, 3.5vw, 3.2rem)', fontWeight: 400, color: '#F0ECE4', lineHeight: 1.3 }}>
                開運科技美容<br />
                <em style={{ color: '#C5A059', fontStyle: 'italic' }}>韓國頂級護膚技術</em>
              </h2>
              <p className="reveal delay-2" style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 19, color: '#9EA89C', lineHeight: 2, marginTop: 20, letterSpacing: '0.07em' }}>
                全程使用韓國原廠進口護膚品 · 教育導向服務理念 · 讓您真正了解自己的肌膚
              </p>
            </div>
            <div className="three-col-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24, marginBottom: 24 }}>
              {treatments.slice(0, 3).map((t, i) => (
                <div key={t.id} className={`svc-card reveal delay-${i + 1}`} style={{ background: 'rgba(13,26,14,0.8)', backdropFilter: 'blur(8px)' }}>
                  <div style={{ overflow: 'hidden', height: 220 }}>
                    <img src={t.img} alt={t.title} className="svc-img" style={{ width: '100%', height: '100%', objectFit: 'cover', filter: 'brightness(0.7) saturate(0.75)' }} />
                  </div>
                  <div style={{ padding: '28px 32px 36px' }}>
                    <div style={{ fontFamily: 'Cinzel, serif', fontSize: 13, letterSpacing: '0.4em', color: '#9EA89C', marginBottom: 8 }}>{t.en}</div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                      <h3 style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 25, fontWeight: 500, color: '#F0ECE4', letterSpacing: '0.05em' }}>{t.title}</h3>
                      <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 40, fontWeight: 300, color: 'rgba(197,160,89,0.2)', lineHeight: 1 }}>{t.id}</div>
                    </div>
                    <div style={{ width: 36, height: 1, background: 'linear-gradient(90deg, #C5A059, transparent)', margin: '14px 0' }} />

                    <div style={{ marginTop: 14, fontFamily: '"Noto Serif TC", serif', fontSize: 17, color: 'rgba(197,160,89,0.65)', letterSpacing: '0.04em' }}>{t.suitable}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="two-col-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
              {treatments.slice(3).map((t, i) => (
                <div key={t.id} className={`svc-card reveal delay-${i + 1}`} style={{ background: 'rgba(13,26,14,0.8)', backdropFilter: 'blur(8px)', display: 'flex' }}>
                  <div style={{ overflow: 'hidden', width: 200, flexShrink: 0 }}>
                    <img src={t.img} alt={t.title} className="svc-img" style={{ width: '100%', height: '100%', objectFit: 'cover', filter: 'brightness(0.7) saturate(0.75)' }} />
                  </div>
                  <div style={{ padding: '28px 32px', flex: 1 }}>
                    <div style={{ fontFamily: 'Cinzel, serif', fontSize: 13, letterSpacing: '0.4em', color: '#9EA89C', marginBottom: 8 }}>{t.en}</div>

                      <h3 style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 24, fontWeight: 500, color: '#F0ECE4', letterSpacing: '0.05em' }}>{t.title}</h3>
                      <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 36, fontWeight: 300, color: 'rgba(197,160,89,0.2)', lineHeight: 1 }}>{t.id}</div>
                    </div>
                    <div style={{ width: 36, height: 1, background: 'linear-gradient(90deg, #C5A059, transparent)', margin: '12px 0' }} />
                    <p style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 18, fontWeight: 300, color: '#9EA89C', lineHeight: 2, letterSpacing: '0.06em' }}>{t.desc}</p>
                    <div style={{ marginTop: 12, fontFamily: '"Noto Serif TC", serif', fontSize: 17, color: 'rgba(197,160,89,0.65)', letterSpacing: '0.04em' }}>{t.suitable}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="reveal delay-3" style={{ textAlign: 'center', marginTop: 60 }}>
              <a href="partners.html" style={{ textDecoration: 'none' }}><button className="btn-gold"><span>預約美容療程</span></button></a>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      useScrollReveal();
      return (
        <React.Fragment>
          <Nav currentPage="beauty" />
          <BeautyCare />
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script src="mgd-beauty-particles.js"></script>
</body>
</html>
