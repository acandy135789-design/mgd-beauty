    const { useState, useEffect } = React;

    function useScrollReveal() {
      useEffect(() => {
        const targets = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
        }, { threshold: 0.12 });
        targets.forEach(t => io.observe(t));
        return () => io.disconnect();
      }, []);
    }

            <div className="overview-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24, marginBottom: 24 }}>
              {sections.slice(0, 6).map((s, i) => (
                <a key={s.title} href={s.href} style={{ textDecoration: 'none' }}>
                  <div className={`ing-circle reveal delay-${(i % 3) + 1}`} style={{
                    background: 'rgba(13,26,14,0.7)', padding: '36px 32px',
                    backdropFilter: 'blur(8px)', height: '100%',
                    transition: 'border-color 0.3s, background 0.3s',
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = 'rgba(13,26,14,0.95)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'rgba(13,26,14,0.7)'}
                  >
                    <div style={{ fontSize: 32, marginBottom: 16 }}>{s.icon}</div>
                    <div style={{ fontFamily: 'Cinzel, serif', fontSize: 14, letterSpacing: '0.35em', color: '#9EA89C', marginBottom: 8 }}>{s.en}</div>
                    <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 26, fontWeight: 500, color: '#F0ECE4', letterSpacing: '0.05em', marginBottom: 12 }}>{s.title}</div>
                    <div style={{ width: 36, height: 1, background: 'linear-gradient(90deg, #C5A059, transparent)', marginBottom: 16 }} />
                    <p style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 18, color: '#9EA89C', lineHeight: 2, letterSpacing: '0.06em' }}>{s.desc}</p>
                    <div style={{ marginTop: 20, fontFamily: '"Noto Serif TC", serif', fontSize: 17, color: 'rgba(197,160,89,0.7)', letterSpacing: '0.1em' }}>了解更多 →</div>
                  </div>
                </a>
              ))}
            </div>
            <a href={sections[6].href} style={{ textDecoration: 'none' }}>
              <div className="ing-circle overview-last-card reveal" style={{
                background: 'rgba(13,26,14,0.7)', padding: '36px 48px',
                backdropFilter: 'blur(8px)',
                display: 'flex', alignItems: 'center', gap: 40,
                transition: 'background 0.3s',
              }}
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(13,26,14,0.95)'}
                onMouseLeave={e => e.currentTarget.style.background = 'rgba(13,26,14,0.7)'}
              >
                <div style={{ fontSize: 44, flexShrink: 0 }}>{sections[6].icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: 'Cinzel, serif', fontSize: 14, letterSpacing: '0.4em', color: '#9EA89C', marginBottom: 8 }}>{sections[6].en}</div>
                  <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 26, fontWeight: 500, color: '#F0ECE4', letterSpacing: '0.05em' }}>{sections[6].title}</div>
                  <p style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 18, color: '#9EA89C', lineHeight: 2, letterSpacing: '0.06em', marginTop: 8 }}>{sections[6].desc}</p>
                </div>
                <div style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 19, color: 'rgba(197,160,89,0.7)', letterSpacing: '0.15em', flexShrink: 0 }}>了解更多 →</div>
              </div>
            </a>
          </div>
        </section>
      );
    }

    function App() {
      useScrollReveal();
      return (
        <React.Fragment>
          <Nav isHome={true} currentPage="home" />
          <Hero />
          <Marquee />
          <SectionOverview />
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script src="mgd-beauty-particles.js"></script>
</body>
</html>
