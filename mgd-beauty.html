<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Garden 美肌花園 · 能量美學品牌</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Cinzel:wght@400;500;600;700;900&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script>
    window.tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              midnight:      '#060d06',
              forest:        '#0d1a0e',
              'deep-forest': '#0a1509',
              moss:          '#2d4a30',
              leaf:          '#3d6840',
              bronze:        '#C5A059',
              'bronze-lt':   '#D4B06A',
              'bronze-pale': '#E8D5A3',

              pearl:         '#F0ECE4',
              cream:         '#FAF7F2',

            fontFamily: {
              serif:   ['"Cormorant Garamond"', 'Georgia', 'serif'],

            },

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="stylesheet" href="mgd-beauty.css">
</head>
<body>

  <canvas id="mist-canvas"></canvas>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function useScrollReveal(activePage) {
      useEffect(() => {
        let io;
        const timer = setTimeout(() => {
          const targets = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
          io = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
          }, { threshold: 0.12 });
          targets.forEach(t => io.observe(t));
        }, 50);
        return () => { clearTimeout(timer); if (io) io.disconnect(); };
      }, [activePage]);
    }

    /* ── NAV ── */
    function Nav({ activePage, onNavigate }) {
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 70);
        window.addEventListener('scroll', fn, { passive: true });
        fn();
        return () => window.removeEventListener('scroll', fn);
      }, []);

      const links = [
        { label: '首頁',       page: 'home' },
        { label: '開運科技健髮', page: 'hair' },
        { label: '開運科技美容', page: 'beauty' },
        { label: '身心靈調理',  page: 'holistic' },
        { label: '創辦人故事',  page: 'founder' },
        { label: '關於我們',    page: 'team' },
        { label: '夥伴資訊',    page: 'partners' },
        { label: '夥伴招募',    page: 'recruit' },
      ];

      const isOpaque = activePage !== 'home' || scrolled;

      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
          transition: 'background 0.7s ease, border-color 0.7s ease, backdrop-filter 0.7s ease',
          background: isOpaque ? 'rgba(6,13,6,0.93)' : 'transparent',
          backdropFilter: isOpaque ? 'blur(14px)' : 'none',
          borderBottom: `1px solid ${isOpaque ? 'rgba(197,160,89,0.22)' : 'transparent'}`,
        }}>
          <div style={{ maxWidth: 1440, margin: '0 auto', padding: '0 32px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 76 }}>

            <a href="#" onClick={e => { e.preventDefault(); onNavigate('home'); }} style={{ textDecoration: 'none', flexShrink: 0, cursor: 'pointer' }}>
              <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 23, fontWeight: 500, letterSpacing: '0.12em', color: '#C5A059', lineHeight: 1 }}>
                Magic Garden 美肌花園
              </div>
              <div style={{ fontFamily: 'Cinzel, serif', fontSize: 12, letterSpacing: '0.45em', color: '#9EA89C', marginTop: 4 }}>
                ENERGY · BEAUTY · VITALITY
              </div>
            </a>

            <div className="nav-links" style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
              {links.map(l => (
                <a key={l.label} href="#" className="nav-link"
                  onClick={e => { e.preventDefault(); onNavigate(l.page); }}
                  style={{
                    fontFamily: '"Noto Serif TC", serif', fontSize: 17, letterSpacing: '0.05em',
                    color: activePage === l.page ? '#C5A059' : '#C8D0C4',
                    textDecoration: 'none', whiteSpace: 'nowrap', cursor: 'pointer',
                    borderBottom: activePage === l.page ? '1px solid rgba(197,160,89,0.5)' : 'none',
                    paddingBottom: 2,
                  }}
                  onMouseEnter={e => e.currentTarget.style.color = '#C5A059'}
                  onMouseLeave={e => e.currentTarget.style.color = activePage === l.page ? '#C5A059' : '#C8D0C4'}
                >{l.label}</a>
              ))}
              <button className="btn-gold" style={{ padding: '11px 24px', fontSize: 15 }}>
                <span>立即預約</span>
              </button>
            </div>
          </div>
        </nav>
      );
    }

    /* ── HERO ── */
    function Hero({ onNavigate }) {
      return (
        <section id="home" className="hero-bg" style={{ position: 'relative', minHeight: '100vh', display: 'flex', alignItems: 'center', overflow: 'hidden' }}>
          <div className="mist-layer" style={{ position: 'absolute', inset: 0, zIndex: 1 }} />

          {[
            { size: 3, left: '12%',  bottom: '22%', delay: 0,   dur: 7  },
            { size: 2, left: '28%',  bottom: '18%', delay: 1.5, dur: 9  },
            { size: 4, left: '55%',  bottom: '30%', delay: 0.8, dur: 11 },
            { size: 2, left: '72%',  bottom: '15%', delay: 2.2, dur: 8  },
            { size: 3, left: '88%',  bottom: '25%', delay: 0.3, dur: 10 },
            { size: 2, left: '42%',  bottom: '12%', delay: 1.8, dur: 7  },
            { size: 5, left: '8%',   bottom: '35%', delay: 3,   dur: 13 },

            <div style={{ display: 'flex', alignItems: 'center', gap: 20, marginBottom: 36, opacity: 0, animation: 'fadeSlide 1.2s ease 0.4s forwards' }}>
              <div style={{ width: 40, height: 1, background: 'linear-gradient(90deg, transparent, #C5A059)' }} />
              <span style={{ fontFamily: 'Cinzel, serif', fontSize: 16, letterSpacing: '0.45em', color: '#C5A059' }}>
                ENERGY BEAUTY · MAGIC GARDEN

            </div>

            <h1 className="hero-h1" style={{
              fontFamily: '"Cormorant Garamond", serif',
              fontSize: 'clamp(3.5rem, 7vw, 6.5rem)',
              fontWeight: 300, lineHeight: 1.1, letterSpacing: '-0.01em',
              color: '#F0ECE4', maxWidth: 860,
              opacity: 0, animation: 'fadeSlide 1.2s ease 0.7s forwards',

              能量美學<br />
              <em style={{ fontStyle: 'italic', color: '#C5A059' }}>喚醒你的美麗魔法</em>
            </h1>

            <p style={{
              fontFamily: '"Noto Serif TC", serif', fontSize: 20, fontWeight: 300,
              color: '#9EA89C', lineHeight: 2, marginTop: 28, maxWidth: 500,
              letterSpacing: '0.08em',
              opacity: 0, animation: 'fadeSlide 1.2s ease 1s forwards',
            }}>
              開運美容護膚 · 秀髮養育 · 身心靈整體調理<br />
              結合韓國頂級護膚技術與外泌體科技<br />
              貴賓預約優先制，為您量身打造專屬美麗方案
            </p>

            <div style={{ display: 'flex', gap: 20, marginTop: 52, alignItems: 'center', opacity: 0, animation: 'fadeSlide 1.2s ease 1.3s forwards' }}>
              <a href="partners.html" style={{ textDecoration: 'none' }}><button className="btn-gold"><span>立即預約體驗</span></button></a>
              <a href="#" onClick={e => { e.preventDefault(); onNavigate('founder'); }} style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 19, color: '#9EA89C', textDecoration: 'none', letterSpacing: '0.1em', borderBottom: '1px solid rgba(158,168,156,0.4)', paddingBottom: 2, transition: 'color 0.3s', cursor: 'pointer' }}

                onMouseLeave={e => e.currentTarget.style.color = '#9EA89C'}
              >認識創辦人 →</a>
            </div>

            <div style={{ display: 'flex', gap: 60, marginTop: 80, paddingTop: 40, borderTop: '1px solid rgba(197,160,89,0.15)', opacity: 0, animation: 'fadeSlide 1.2s ease 1.6s forwards' }}>
              {[
                { num: '9+',  label: '全台服務據點' },
                { num: '5+',  label: '專業美療項目' },
                { num: '18歲', label: '創業・韓國原廠授權' },

                  <div style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 16, color: '#9EA89C', marginTop: 8, letterSpacing: '0.1em' }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ position: 'absolute', bottom: 40, left: '50%', transform: 'translateX(-50%)', zIndex: 3, textAlign: 'center' }}>
            <div style={{ fontFamily: 'Cinzel, serif', fontSize: 14, letterSpacing: '0.4em', color: '#9EA89C', marginBottom: 12 }}>SCROLL</div>
            <div style={{ width: 1, height: 48, background: 'linear-gradient(180deg, #C5A059, transparent)', margin: '0 auto' }} className="scroll-dot" />
          </div>

          <style>{`
            @keyframes fadeSlide {
              from { opacity: 0; transform: translateY(30px); }
              to   { opacity: 1; transform: translateY(0); }
            }
          `}</style>
        </section>
      );
    }

    /* ── MARQUEE ── */
    function Marquee() {
      const words = ['開運科技健髮', '開運科技美容', '外泌體育髮技術', '韓國頂級護膚', '身心靈整體調理', '能量美學品牌', '貴賓預約優先', '開運能量加持', '科技煥膚療程', '美麗從心出發'];
      const items = [...words, ...words];
      return (
        <div style={{ background: 'rgba(197,160,89,0.08)', borderTop: '1px solid rgba(197,160,89,0.15)', borderBottom: '1px solid rgba(197,160,89,0.15)', padding: '18px 0', overflow: 'hidden' }}>
          <div className="marquee-track">
            {items.map((w, i) => (
              <span key={i} style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 19, letterSpacing: '0.2em', color: '#C5A059', padding: '0 40px', whiteSpace: 'nowrap', opacity: 0.85 }}>

            <div className="reveal-left">
              <div style={{ fontFamily: 'Cinzel, serif', fontSize: 15, letterSpacing: '0.5em', color: '#C5A059', marginBottom: 24 }}>FOUNDER'S STORY</div>
              <div className="gold-line-left" />

              <h2 style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 'clamp(2rem, 3.5vw, 3rem)', fontWeight: 400, color: '#F0ECE4', lineHeight: 1.3, letterSpacing: '0.02em' }}>

              <p style={{ fontFamily: '"Noto Serif TC", serif', fontSize: 20, fontWeight: 300, color: '#9EA89C', lineHeight: 2.2, marginTop: 16, letterSpacing: '0.08em' }}>
                17歲時，Momo 遠赴韓國深入研究，親身試用超過 30 種護膚配方，終於找到真正穩定膚況的解方。18歲正式創立 Magic Garden 美肌花園，取得多個韓國品牌台灣總代理權，並取得外泌體原液的台灣獨家專利技術，將科技美容與育髮帶入全新境界。

            </div>

            <div className="reveal-right" style={{ position: 'relative' }}>

    /* ── SECTION OVERVIEW (首頁用) ── */
    function SectionOverview({ onNavigate }) {
      const sections = [
        { title: '創辦人故事', en: "FOUNDER'S STORY", desc: '從敏感肌困擾到美麗魔法師，18歲創立品牌的傳奇故事', page: 'founder', icon: '✨' },

        { title: '身心靈調理', en: 'MIND · BODY · SPIRIT', desc: '能量共振、內外兼修，找回身心平衡的整體調理', page: 'holistic', icon: '🔮' },

    /* ── HAIR CARE ── */
    function HairCare() {

  <script>
    // 禁止右鍵
    document.addEventListener('contextmenu', e => e.preventDefault());
    // 禁止拖曳圖片
    document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
    // 禁止 F12 / Ctrl+U / Ctrl+S / Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C
    document.addEventListener('keydown', e => {
      if (e.key === 'F12') { e.preventDefault(); return false; }
      if (e.ctrlKey && ['u','U','s','S'].includes(e.key)) { e.preventDefault(); return false; }
      if (e.ctrlKey && e.shiftKey && ['i','I','j','J','c','C'].includes(e.key)) { e.preventDefault(); return false; }
    });
  </script>
